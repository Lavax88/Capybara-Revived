name: Build Capybara-Revived

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Root Manager / Kernel Variant'
        required: true
        default: 'resukisu'
        type: choice
        options:
          - 'resukisu'
          - 'noroot'
      tickrate:
        description: 'Timer frequency / Tickrate (Hz)'
        required: true
        default: '300'
        type: choice
        options:
          - '100'
          - '150'
          - '250'
          - '300'
          - '500'
          - '1000'
      lto:
        description: 'Link-Time Optimization (LTO)'
        required: true
        default: 'thin'
        type: choice
        options:
          - 'thin'
          - 'full'
          - 'no'
      susfs:
        description: 'Enable SUSFS v2.2.0 Support'
        required: true
        default: true
        type: boolean
      uname_spoof:
        description: 'Enable SUSFS Uname Spoofing'
        required: true
        default: true
        type: boolean
      nomount:
        description: 'Enable NoMount Support'
        required: true
        default: true
        type: boolean
      droidspaces:
        description: 'Enable DroidSpaces Support'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:

      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex git gnupg gperf libelf-dev libssl-dev libtinfo6 make openjdk-11-jdk rsync unzip zip zlib1g-dev libncurses-dev libncurses6


      - name: Build Kernel
        run: |
          if [ "${{ github.event.inputs.variant }}" = "resukisu" ]; then
            export BUILD_RESUKISU="y"
          else
            export BUILD_RESUKISU="n"
          fi

          if [ "${{ github.event.inputs.susfs }}" = "true" ] && [ "$BUILD_RESUKISU" = "y" ]; then
            export BUILD_SUSFS="y"
          else
            export BUILD_SUSFS="n"
          fi

          if [ "${{ github.event.inputs.uname_spoof }}" = "true" ] && [ "$BUILD_SUSFS" = "y" ]; then
            export BUILD_SUSFS_SPOOF_UNAME="y"
          else
            export BUILD_SUSFS_SPOOF_UNAME="n"
          fi

          if [ "${{ github.event.inputs.nomount }}" = "true" ] && [ "$BUILD_RESUKISU" = "y" ]; then
            export BUILD_NOMOUNT="y"
          else
            export BUILD_NOMOUNT="n"
          fi

          if [ "${{ github.event.inputs.droidspaces }}" = "true" ]; then
            export BUILD_DROIDSPACES="y"
          else
            export BUILD_DROIDSPACES="n"
          fi

          export TICKRATE="${{ github.event.inputs.tickrate }}"
          export LTO="${{ github.event.inputs.lto }}"

          chmod +x ./build_kernel.sh
          ./build_kernel.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.run_id }}
          name: Capybara-Revived Build #${{ github.run_number }}
          body: |
            ### Build Configuration & Settings

            | Setting | Configured Value | Details |
            | :--- | :--- | :--- |
            | Kernel Release Name | `6.6.77-Capybara-Revived` | Custom GKI Kernel |
            | CPU Tickrate | `${{ github.event.inputs.tickrate }} Hz` | Configured Frequency |
            | LTO Mode | `${{ github.event.inputs.lto }}` | Link-Time Optimization |
            | Root Manager | `${{ github.event.inputs.variant == 'resukisu' && 'ReSukiSU (Root)' || 'Disabled (No Root)' }}` | KernelSU / ReSukiSU |
            | SUSFS Support | `${{ (github.event.inputs.variant == 'resukisu' && github.event.inputs.susfs == 'true') && 'Enabled (v2.2.0)' || 'Disabled' }}` | Super User Secret FS |
            | SUSFS Uname Spoofing | `${{ (github.event.inputs.variant == 'resukisu' && github.event.inputs.susfs == 'true' && github.event.inputs.uname_spoof == 'true') && 'Enabled' || 'Disabled' }}` | Kernel Uname Masking |
            | NoMount Support | `${{ (github.event.inputs.variant == 'resukisu' && github.event.inputs.nomount == 'true') && 'Enabled' || 'Disabled' }}` | VFS Path Redirection & Injection |
            | DroidSpaces Support | `${{ github.event.inputs.droidspaces == 'true' && 'Enabled' || 'Disabled' }}` | Isolated Container Support |
            | Baseband-guard | Enabled (Latest Upstream) | Anti-Format LSM Partition Guard |
            | Compiler Toolchain | Neutron Clang | LLVM |

            > [!CAUTION]
            > **BACKUP your boot.img / recovery** before flashing to recover from potential issues.

            **Commit Details**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          files: Capybara-Revived-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
